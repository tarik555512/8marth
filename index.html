<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, Мама!</title>
    <style>
        /* Основные стили */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Чтобы не было полос прокрутки из-за цветов */
            color: #d81b60;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 10;
            max-width: 500px;
            border: 2px solid #f8bbd0;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .heart {
            color: #e91e63;
            font-size: 2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Стили для падающих цветов */
        .flower {
            position: fixed;
            top: -50px;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            font-size: 24px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>С 8 Марта!</h1>
        <p>Дорогая мама, поздравляю тебя с праздником весны!</p>
        <p>Пусть каждый твой день будет наполнен радостью, теплом и улыбками. Ты — самое дорогое, что у меня есть.</p>
        <div class="heart">❤️</div>
    </div>

    <script>
        function createFlower() {
            const flowerIcons = ['🌸', '🌷', '🌹', '🌺', '🌼'];
            const flower = document.createElement('div');
            flower.classList.add('flower');
            
            // Случайный выбор цветка
            flower.innerText = flowerIcons[Math.floor(Math.random() * flowerIcons.length)];
            
            // Случайное положение по горизонтали
            flower.style.left = Math.random() * 100 + 'vw';
            
            // Случайная длительность анимации (скорость падения)
            const duration = Math.random() * 3 + 2; 
            flower.style.animationDuration = duration + 's';
            
            // Случайный размер
            flower.style.fontSize = Math.random() * 20 + 20 + 'px';

            document.body.appendChild(flower);

            // Удаляем цветок после завершения анимации
            setTimeout(() => {
                flower.remove();
            }, duration * 1000);
        }

        // Создаем цветы через равные промежутки времени
        setInterval(createFlower, 300);
    </script>
</body>
</html>
